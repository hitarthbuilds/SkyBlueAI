services:
  backend:
    build: ./backend
    env_file:
      - ./.env.prod
    environment:
      - STORAGE_ROOT=/app/storage
    volumes:
      - ./storage:/app/storage
    command: ["gunicorn", "-k", "uvicorn.workers.UvicornWorker", "-w", "2", "-b", "0.0.0.0:8000", "app.main:app"]
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=skyblue
      - POSTGRES_PASSWORD=skyblue
      - POSTGRES_DB=skyblueai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=skyblue
      - MINIO_ROOT_PASSWORD=skyblue123
    command: server /data --console-address ":9001"
    volumes:
      - minio:/data
    restart: unless-stopped

volumes:
  pgdata:
  minio:
