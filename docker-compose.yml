services:
  backend:
    build: ./backend
    env_file:
      - ./.env.example
    environment:
      - DATABASE_URL=postgresql+psycopg://skyblue:skyblue@postgres:5432/skyblueai
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ROOT=/app/storage
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=skyblue
      - POSTGRES_PASSWORD=skyblue
      - POSTGRES_DB=skyblueai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=skyblue
      - MINIO_ROOT_PASSWORD=skyblue123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data

volumes:
  pgdata:
  minio:
